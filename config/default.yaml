camera:
  source: 0 # int=デバイス番号 / 数字文字列="0"等もデバイス / それ以外=動画パス・RTSP URL
  fps: 15
  width: 1280
  height: 720
  max_queue_length: 10

detection:
  model_path: models/yolox_s.onnx
  providers: ['CPUExecutionProvider']
  score_threshold: 0.5 # ByteTrack の追跡開始しきい値（生検出フィルタではない）
  detection_threshold: 0.1 # 生検出 confidence の下限フィルタ
  nms_iou_threshold: 0.45 # NMS の IoU しきい値
  class_names: ['person', 'bicycle', 'car', 'motorcycle', 'airplane', 'bus', 'train', 'truck', 'boat', 'traffic light',
                'fire hydrant', 'stop sign', 'parking meter', 'bench', 'bird', 'cat', 'dog', 'horse', 'sheep', 'cow',
                'elephant', 'bear', 'zebra', 'giraffe', 'backpack', 'umbrella', 'handbag', 'tie', 'suitcase', 'frisbee',
                'skis', 'snowboard', 'sports ball', 'kite', 'baseball bat', 'baseball glove', 'skateboard', 'surfboard',
                'tennis racket', 'bottle', 'wine glass', 'cup', 'fork', 'knife', 'spoon', 'bowl', 'banana', 'apple',
                'sandwich', 'orange', 'broccoli', 'carrot', 'hot dog', 'pizza', 'donut', 'cake', 'chair', 'couch',
                'potted plant', 'bed', 'dining table', 'toilet', 'tv', 'laptop', 'mouse', 'remote', 'keyboard',
                'cell phone', 'microwave', 'oven', 'toaster', 'sink', 'refrigerator', 'book', 'clock', 'vase',
                'scissors', 'teddy bear', 'hair drier', 'toothbrush']

tracking:
  class_id: [0] # Track only persons by default
  max_lost: 30
  min_box_area: 100
  iou_threshold: 0.5
  frame_read_policy: bounded_latest # fifo, latest, or bounded_latest
  max_frame_skip: 2 # Used by bounded_latest

gui:
  window_width: 1600
  window_height: 900
  window_x: 100
  window_y: 100
  display_image_width: 1280
  display_image_height: 720
  frame_buffer_seconds: 2.0 # Keep frames long enough to match delayed tracking results

logging:
  level: "INFO"
  output: "console"
  performance_interval: 100
